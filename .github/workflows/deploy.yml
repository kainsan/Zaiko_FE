name: Build and Push Docker Image

# Kịch bản này sẽ chạy mỗi khi có code mới được Push lên nhánh main
on:
  push:
    branches:
      - main # (Nếu nhánh chính của bạn tên là 'master' thì sửa lại chữ này nhé)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Clone code từ repo của bạn về máy chủ GitHub
      - name: Checkout code
        uses: actions/checkout@v3

      # Bước 2: Đăng nhập vào Docker Hub bằng chìa khóa trong két sắt
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Bước 3: Đọc file Dockerfile, build và đẩy lên kho kainsan/zaiko-frontend
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: kainsan/zaiko-frontend:latest
